<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Registration</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        height: 100vh;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        padding: 30px;
        border-radius: 20px;
        width: 350px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        text-align: center;
    }

    .dark-btn {
        background: #000;
        color: #fff;
        padding: 10px;
        border-radius: 30px;
        margin-bottom: 15px;
        display: inline-block;
        width: 80%;
    }

    h2 {
        margin-bottom: 20px;
        color: #003366;
    }

    .input-box {
        margin: 15px 0;
    }

    .input-box input {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: none;
        outline: none;
        background: rgba(255,255,255,0.8);
    }

    .btn-group {
        display: flex;
        justify-content: space-between;
        margin-top: 20px;
    }

    button {
        padding: 12px;
        border: none;
        border-radius: 25px;
        width: 48%;
        font-size: 16px;
        cursor: pointer;
    }

    .register {
        background: linear-gradient(45deg, #007bff, #00c6ff);
        color: #fff;
    }

    .reset {
        background: #333;
        color: #fff;
    }

    button:hover {
        opacity: 0.9;
    }
</style>
</head>

<body>

<div class="container">
    <div class="dark-btn">🌙 Dark Mode</div>

    <h2>✨ Premium Registration</h2>

    <form>
        <div class="input-box">
            <input type="text" placeholder="Full Name" required>
        </div>

        <div class="input-box">
            <input type="email" placeholder="Email" required>
        </div>

        <div class="input-box">
            <input type="password" placeholder="Password" required>
        </div>

        <div class="input-box">
            <input type="tel" placeholder="Phone Number" required
