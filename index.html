<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffd700, #fff8dc); /* golden + light yellow */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Form Box */
form{
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 400px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

/* Heading */
h1, h2{
    text-align: center;
    color: #b8860b; /* dark golden */
}

/* Labels */
label{
    font-weight: bold;
    color: #444;
}

/* Inputs */
input, select, textarea{
    width: 100%;
    padding: 10px;
    margin: 8px 0 15px;
    border-radius: 10px;
    border: 1px solid #ddd;
    transition: 0.3s;
}

/* Focus Effect */
input:focus, select:focus, textarea:focus{
    outline: none;
    border: 2px solid #ffd700;
    box-shadow: 0 0 10px rgba(255,215,0,0.6);
}

/* Button */
button{
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 25px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    background: linear-gradient(135deg, #ffcc00, #daa520); /* yellow → golden */
    transition: 0.3s;
}

/* Hover Effect */
button:hover{
    transform: scale(1.05);
    box-shadow: 0 5px 15px rgba(218,165,32,0.6);
}
        </style>
    <meta charset="UTF-8">
    <title>Registration Form</title>
</head>
<body>

    <h2>Registration Form</h2>

    <form>

        <!-- Full Name -->
        <label for="name">Full Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <!-- Email -->
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <!-- Password -->
        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password" required><br><br>

        <!-- Gender -->
        <label>Gender:</label><br>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label><br>

        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label><br><br>

        <!-- Course/Interest -->
        <label for="course">Course/Interest:</label><br>
        <select id="course" name="course">
            <option value="">--Select--</option>
            <option value="web">Web Development</option>
            <option value="app">App Development</option>
            <option value="ai">Artificial Intelligence</option>
            <option value="data">Data Science</option>
        </select><br><br>

        <!-- Submit Button -->
        <input type="submit" value="Register">

    </form>

</body>
</html>
