<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #11998e, #38ef7d);
  transition: 0.4s;
}

/* Glass Container */
.container {
  width: 350px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(15px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  text-align: center;
  animation: fadeIn 1s ease;
}

/* Animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px);}
  to { opacity: 1; transform: translateY(0);}
}

/* Toggle Button */
.toggle-btn {
  background: rgba(0,0,0,0.2);
  color: white;
  border: none;
  padding: 10px;
  border-radius: 25px;
  width: 100%;
  margin-bottom: 15px;
  cursor: pointer;
  transition: 0.3s;
}

.toggle-btn:hover {
  background: rgba(0,0,0,0.4);
}

/* Title */
h2 {
  margin-bottom: 20px;
  color: #fff;
  font-weight: 600;
}

/* Input Fields */
.input-box {
  position: relative;
  margin-bottom: 18px;
}

.input-box input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.8);
  font-size: 14px;
  transition: 0.3s;
}

.input-box input:focus {
  background: white;
  box-shadow: 0 0 8px #38ef7d;
}

/* Eye Icon */
.input-box span {
  position: absolute;
  right: 12px;
  top: 12px;
  cursor: pointer;
}

/* Buttons */
.btn-group {
  display: flex;
  justify-content: space-between;
  margin-top: 15px;
}

.btn {
  width: 48%;
  padding: 12px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  font-size: 14px;
  transition: 0.3s;
}

/* Register Button */
.register {
  background: linear-gradient(135deg, #00c853, #64dd17);
  color: white;
}

.register:hover {
  transform: scale(1.05);
}

/* Reset Button */
.reset {
  background: rgba(0,0,0,0.2);
  color: white;
}

.reset:hover {
  background: rgba(0,0,0,0.4);
}

/* DARK MODE */
.dark {
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}

.dark .container {
  background: rgba(0,0,0,0.4);
  color: white;
}

.dark input {
  background: rgba(255,255,255,0.2);
  color: white;
}

</style>
</head>

<body>

<div class="container">
  <button class="toggle-btn" onclick="toggleMode()">🌙 Dark Mode</button>

  <h2>✨ Premium Registration</h2>

  <form>
    <div class="input-box">
      <input type="text" placeholder="Full Name" required>
    </div>

    <div class="input-box">
      <input type="email" placeholder="Email" required>
    </div>

    <div class="input-box">
      <input type="password" id="password" placeholder="Password" required>
      <span onclick="togglePassword()">👁️</span>
    </div>

    <div class="input-box">
      <input type="text" placeholder="Phone Number" required>
    </div>

    <div class="btn-group">
      <button type="submit" class="btn register">🚀 Register</button>
      <button type="reset" class="btn reset">🔄 Reset</button>
    </div>
  </form>
</div>

<script>
function togglePassword() {
  let pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}

function toggleMode() {
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
